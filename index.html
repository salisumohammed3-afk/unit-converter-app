<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .converter-group {
            margin-bottom: 35px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .converter-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            color: #64ffda;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .input-container label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-size: 0.9rem;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #64ffda;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.1);
        }

        input[type="number"]::placeholder {
            color: #666;
        }

        .swap-icon {
            color: #64ffda;
            font-size: 1.5rem;
            margin: 0 10px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .swap-icon:hover {
            opacity: 1;
        }

        .formula {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
                margin: 10px;
            }
            
            h1 {
                font-size: 2rem;
                margin-bottom: 30px;
            }
            
            .converter-group {
                padding: 20px;
                margin-bottom: 25px;
            }
            
            .input-group {
                flex-direction: column;
                gap: 10px;
            }
            
            .swap-icon {
                transform: rotate(90deg);
                margin: 10px 0;
            }
        }

        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unit Converter</h1>
        
        <!-- Distance Converter -->
        <div class="converter-group">
            <div class="converter-title">Distance</div>
            <div class="input-group">
                <div class="input-container">
                    <label for="km">Kilometers</label>
                    <input type="number" id="km" placeholder="Enter kilometers" step="any">
                </div>
                <div class="swap-icon">⇄</div>
                <div class="input-container">
                    <label for="miles">Miles</label>
                    <input type="number" id="miles" placeholder="Enter miles" step="any">
                </div>
            </div>
            <div class="formula">1 km = 0.621371 miles</div>
        </div>

        <!-- Weight Converter -->
        <div class="converter-group">
            <div class="converter-title">Weight</div>
            <div class="input-group">
                <div class="input-container">
                    <label for="kg">Kilograms</label>
                    <input type="number" id="kg" placeholder="Enter kilograms" step="any">
                </div>
                <div class="swap-icon">⇄</div>
                <div class="input-container">
                    <label for="lbs">Pounds</label>
                    <input type="number" id="lbs" placeholder="Enter pounds" step="any">
                </div>
            </div>
            <div class="formula">1 kg = 2.20462 lbs</div>
        </div>

        <!-- Temperature Converter -->
        <div class="converter-group">
            <div class="converter-title">Temperature</div>
            <div class="input-group">
                <div class="input-container">
                    <label for="celsius">Celsius</label>
                    <input type="number" id="celsius" placeholder="Enter celsius" step="any">
                </div>
                <div class="swap-icon">⇄</div>
                <div class="input-container">
                    <label for="fahrenheit">Fahrenheit</label>
                    <input type="number" id="fahrenheit" placeholder="Enter fahrenheit" step="any">
                </div>
            </div>
            <div class="formula">°C = (°F - 32) × 5/9</div>
        </div>
    </div>

    <script>
        // Distance conversion functions
        function kmToMiles(km) {
            return km * 0.621371;
        }

        function milesToKm(miles) {
            return miles / 0.621371;
        }

        // Weight conversion functions
        function kgToLbs(kg) {
            return kg * 2.20462;
        }

        function lbsToKg(lbs) {
            return lbs / 2.20462;
        }

        // Temperature conversion functions
        function celsiusToFahrenheit(celsius) {
            return (celsius * 9/5) + 32;
        }

        function fahrenheitToCelsius(fahrenheit) {
            return (fahrenheit - 32) * 5/9;
        }

        // Utility function to round to reasonable decimal places
        function roundToDecimal(num, decimals = 6) {
            return Math.round(num * Math.pow(10, decimals)) / Math.pow(10, decimals);
        }

        // Get all input elements
        const kmInput = document.getElementById('km');
        const milesInput = document.getElementById('miles');
        const kgInput = document.getElementById('kg');
        const lbsInput = document.getElementById('lbs');
        const celsiusInput = document.getElementById('celsius');
        const fahrenheitInput = document.getElementById('fahrenheit');

        // Distance converters
        kmInput.addEventListener('input', function() {
            const value = parseFloat(this.value);
            if (!isNaN(value)) {
                milesInput.value = roundToDecimal(kmToMiles(value));
            } else {
                milesInput.value = '';
            }
        });

        milesInput.addEventListener('input', function() {
            const value = parseFloat(this.value);
            if (!isNaN(value)) {
                kmInput.value = roundToDecimal(milesToKm(value));
            } else {
                kmInput.value = '';
            }
        });

        // Weight converters
        kgInput.addEventListener('input', function() {
            const value = parseFloat(this.value);
            if (!isNaN(value)) {
                lbsInput.value = roundToDecimal(kgToLbs(value));
            } else {
                lbsInput.value = '';
            }
        });

        lbsInput.addEventListener('input', function() {
            const value = parseFloat(this.value);
            if (!isNaN(value)) {
                kgInput.value = roundToDecimal(lbsToKg(value));
            } else {
                kgInput.value = '';
            }
        });

        // Temperature converters
        celsiusInput.addEventListener('input', function() {
            const value = parseFloat(this.value);
            if (!isNaN(value)) {
                fahrenheitInput.value = roundToDecimal(celsiusToFahrenheit(value));
            } else {
                fahrenheitInput.value = '';
            }
        });

        fahrenheitInput.addEventListener('input', function() {
            const value = parseFloat(this.value);
            if (!isNaN(value)) {
                celsiusInput.value = roundToDecimal(fahrenheitToCelsius(value));
            } else {
                celsiusInput.value = '';
            }
        });

        // Clear all inputs when page loads
        window.addEventListener('load', function() {
            const inputs = document.querySelectorAll('input[type="number"]');
            inputs.forEach(input => input.value = '');
        });
    </script>
</body>
</html>
